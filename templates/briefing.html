<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ data.date }} · {{ data.title }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --ink:       #0f0f0f;
      --ink-2:     #2a2a2a;
      --ink-3:     #6b6b6b;
      --rule:      #d8d0c4;
      --paper:     #f7f4ef;
      --paper-2:   #efe9e0;
      --accent:    #b5451b;
      --accent-2:  #1b4db5;
      --tag-bg:    #eae4da;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Noto Sans SC', 'PingFang SC', system-ui, sans-serif;
      font-weight: 400;
      line-height: 1.8;
      min-height: 100vh;
    }

    /* ── MASTHEAD ── */
    .masthead {
      border-bottom: 3px double var(--ink);
      padding: 28px 0 20px;
      text-align: center;
      background: var(--paper);
    }
    .masthead-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--ink-3);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .masthead-title {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(1.4rem, 3.5vw, 2.1rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.35;
      color: var(--ink);
      max-width: 680px;
      margin: 0 auto 14px;
      padding: 0 24px;
    }
    .masthead-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--ink-3);
    }
    .masthead-meta .date {
      color: var(--accent);
      font-weight: 500;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── ACTION BAR ── */
    .action-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 36px;
    }
    .copy-btn {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      border: 1.5px solid var(--ink);
      border-radius: 2px;
      padding: 7px 18px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
      background: var(--ink);
      color: var(--paper);
    }
    .copy-btn:hover { background: var(--ink-2); }
    .copy-btn.copied {
      background: #1a6e35;
      border-color: #1a6e35;
    }
    .update-note {
      font-size: 0.7rem;
      color: var(--ink-3);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── BODY CONTENT ── */
    #briefing-body {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.97rem;
      line-height: 2;
      color: var(--ink-2);
    }

    /* Section headers like ☀️全球动态 */
    .section-header {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--ink);
      margin: 36px 0 18px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--ink);
      letter-spacing: 0.03em;
    }
    .section-header:first-child { margin-top: 0; }

    /* Sub-headers like 【国际消息】 */
    .sub-header {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.06em;
      margin: 22px 0 10px;
      text-transform: uppercase;
    }

    /* Individual news items */
    .news-item {
      padding: 10px 0 10px 16px;
      border-left: 2px solid var(--rule);
      margin-bottom: 10px;
      font-size: 0.95rem;
      line-height: 1.85;
    }
    .news-item:hover { border-left-color: var(--accent); }

    /* Company name in 行情演绎 */
    .company-name {
      font-weight: 600;
      color: var(--ink);
    }

    /* 核心推荐 */
    .rec-section {
      background: var(--paper-2);
      border: 1.5px solid var(--rule);
      border-radius: 3px;
      padding: 22px 24px;
      margin: 28px 0;
    }
    .rec-primary {
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1.9;
      margin-bottom: 8px;
    }
    .rec-watch {
      font-size: 0.88rem;
      color: var(--ink-3);
      line-height: 1.8;
    }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 40px 0;
    }

    /* ── SOURCES ── */
    .sources-section {
      padding: 24px 0 48px;
    }
    .sources-header {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 18px;
    }
    .sources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 10px;
    }
    .source-card {
      border: 1px solid var(--rule);
      border-radius: 2px;
      padding: 10px 14px;
      background: var(--paper);
      transition: border-color 0.15s;
    }
    .source-card:hover { border-color: var(--ink-3); }
    .source-card a {
      color: var(--accent-2);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      display: block;
      margin-bottom: 3px;
      line-height: 1.4;
    }
    .source-card a:hover { text-decoration: underline; }
    .source-desc {
      font-size: 0.72rem;
      color: var(--ink-3);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: var(--paper);
      font-size: 0.82rem;
      padding: 10px 22px;
      border-radius: 3px;
      opacity: 0;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      white-space: nowrap;
      font-family: 'Noto Sans SC', sans-serif;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding: 24px 0 48px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--ink-3);
      letter-spacing: 0.06em;
    }
    .footer a { color: var(--ink-3); text-decoration: underline; }

    @media (max-width: 600px) {
      .sources-grid { grid-template-columns: 1fr; }
      .masthead-meta { flex-wrap: wrap; gap: 10px; }
      .action-bar { flex-wrap: wrap; gap: 10px; }
    }
  </style>
</head>
<body>

<div class="masthead">
  <div class="masthead-label">AI · 算力 · 投资简报</div>
  <div class="masthead-title">{{ data.title }}</div>
  <div class="masthead-meta">
    <span class="date">{{ data.date }}</span>
  </div>
</div>

<div class="container">
  <div class="action-bar">
    <button class="copy-btn" onclick="copyContent()">📋 复制全文</button>
    <span class="update-note">更新于 {{ generated_at }}</span>
  </div>

  <div id="briefing-body">
    {{ body_html | safe }}
  </div>

  <hr class="divider">

  {% if data.sources %}
  <div class="sources-section">
    <div class="sources-header">📎 内容来源  ·  {{ data.sources | length }} 条</div>
    <div class="sources-grid">
      {% for s in data.sources %}
      <div class="source-card">
        <a href="{{ s.url }}" target="_blank" rel="noopener">{{ s.title }}</a>
        <div class="source-desc">{{ s.desc }}</div>
      </div>
      {% endfor %}
    </div>
  </div>
  {% endif %}
</div>

<div class="footer">每日北京时间自动更新一次</div>

<div class="toast" id="toast"></div>

<script>
  function copyContent() {
    const btn = document.querySelector('.copy-btn');
    const date = document.querySelector('.masthead-meta .date').innerText;
    const title = document.querySelector('.masthead-title').innerText;
    const body = document.getElementById('briefing-body').innerText;
    const text = date + ' ' + title + '\n\n' + body;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ 已复制';
      btn.classList.add('copied');
      showToast('全文已复制到剪贴板');
      setTimeout(() => {
        btn.textContent = '📋 复制全文';
        btn.classList.remove('copied');
      }, 2500);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('全文已复制');
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>

</body>
</html>
